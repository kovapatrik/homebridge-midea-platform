name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: npm dist-tag
        required: true
        default: beta
        type: choice
        options:
          - beta
          - next
          - latest

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
      - run: npm ci
      - run: npm publish --tag ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || 'latest' }}
